### 🚀 Alur Deployment & Setup Berkas

#### Langkah 1: Push Kode Master Hub (Pusat)
Pastikan berkas konfigurasi \`.clasp.json\` di direktori \`hub-master\` menunjuk ke Script ID Spreadsheet Master Lisensi Anda. Jalankan perintah deploy otomatis:
\`\`\`bash
node multi-deploy.js Master
\`\`\`
*Catatan: Skrip ini secara cerdas mengatur folder yang diabaikan menggunakan filter folder agar file Spoke tidak bercampur dengan Hub.*

#### Langkah 2: Inisialisasi Database Master

2. **\`apiInitHubData\`**: Menyiapkan data Kabupaten/Kota NTB ke sheet referensi \`REF_KOTA\`.
3. **\`installMasterTriggers\`**: Memasang trigger pelacak waktu aktif otomatis.

#### Langkah 3: Publikasikan Web App Master

#### Langkah 4: Hubungkan Skrip Sekolah (Spoke)

- **Property:** \`LICENSE_SERVER_URL\`
- **Value:** *[Masukkan URL Web App Master yang Anda salin pada Langkah 3]*

#### Langkah 5: Distribusikan Update Sekolah secara Massal
Untuk men-deploy update kode sekolah terbaru ke seluruh client sekaligus, jalankan:

node multi-deploy.js --all-schools

\`\`\``,

                        question: "Mengapa disarankan untuk menambahkan konfigurasi 'cleanUrls' di dalam file vercel.json pada portal portofolio Anda?",
                        options: [
                            { id: "a", text: "Agar seluruh aset gambar dikompresi otomatis di server Vercel." },
                            { id: "b", text: "Agar halaman web statis dapat diakses tanpa menyertakan ekstensi '.html' di URL browser (URL bersih)." },
                            { id: "c", text: "Untuk melarang akses pengguna luar selain administrator." },
                            { id: "d", text: "Mencegah duplikasi file CSS dan JS di memori server." }
                        ],
                        correctAnswer: "b",
                        explanation: "Pengaturan 'cleanUrls': true dalam vercel.json memberi tahu server Vercel agar mengizinkan akses ke berkas HTML seperti '/sca-bos' tanpa harus menulis '/sca-bos/index.html' di kolom URL peramban."
                    }
                },
                {
                    id: "ch-finish",
                    title: "6. Penutup & Langkah Selanjutnya",
                    content: `### 🎓 Selamat! Anda Telah Menguasai Setup Proyek GAS Hub!

Kini Anda telah memiliki pemahaman arsitektur yang mendalam mengenai sistem kerja tiga proyek GAS andalan Anda:
- **SCA-BOS-GAS**: Pola Hub & Spoke untuk desentralisasi data.
- **LMS Sekolah GAS**: Pola SPA reaktif Alpine.js berbasis Google Sheets.
- **CBT System Pro**: Multi-deployment otomatis dengan standar keamanan Exambrowser tinggi.

Sistem dokumentasi interaktif ini dapat Anda baca kapan saja sebagai pengingat jika Anda melupakan langkah deployment. Kuis yang Anda kerjakan membantu memvalidasi pemahaman teknis Anda agar tidak terjadi kesalahan konfigurasi di lingkungan sekolah riil.

---

### 💡 Tips Perawatan Portofolio di Masa Depan
1. **Perbarui URL secara berkala**: Setiap kali Anda membuat rilis major baru di Google Sheets, pastikan untuk memperbarui URL-nya di dalam file \`index.html\` kontainer terkait dan lakukan push ke GitHub.
2. **Kembangkan Fitur Baru**: Anda bisa mengintegrasikan sistem login firebase, integrasi Google Drive API tambahan, atau menu analitis Chart.js lainnya langsung ke dalam portal ini.

*Teruslah berkarya, dan rancang masa depan pendidikan digital Indonesia yang lebih baik bersama Antigravity AI Assistant!*`
                }
            ]
        };

        // State Management
        const storageKey = 'gas_portal_guide_state';
        const defaultState = {
            currentIdx: 0,
            xp: 0,
            level: 1,
            streak: 1,
            timer: {
                timeLeft: 25 * 60,
                isActive: false,
                mode: 'work' // 'work' or 'break'
            }
        };

        let state = { ...defaultState };

        // Load saved state from LocalStorage
        const saved = localStorage.getItem(storageKey);
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                state = { ...defaultState, ...parsed };
                // Ensure timer is not active on load
                state.timer.isActive = false;
            } catch (e) {
                console.error("Gagal memuat state dari LocalStorage", e);
            }
        }

        // DOM Elements
        const elements = {
            progress: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            level: document.getElementById('level-val'),
            streak: document.getElementById('streak-val'),
            xp: document.getElementById('xp-val'),
            nextLevelXp: document.getElementById('next-level-xp'),
            xpBar: document.getElementById('xp-bar'),
            timerLabel: document.getElementById('timer-label'),
            timerDisplay: document.getElementById('timer-display'),
            timerToggle: document.getElementById('timer-toggle'),
            timerReset: document.getElementById('timer-reset'),
            toc: document.getElementById('toc'),
            title: document.getElementById('chapter-title'),
            meta: document.getElementById('chapter-meta'),
            content: document.getElementById('chapter-content'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            modalOverlay: document.getElementById('modal-overlay'),
            modalContent: document.getElementById('modal-content'),
            modalTitle: document.getElementById('modal-title'),
            modalBody: document.getElementById('modal-body'),
            modalFooter: document.getElementById('modal-footer'),
            modalIcon: document.getElementById('modal-icon'),
            modalIconContainer: document.getElementById('modal-icon-container')
        };

        let timerInterval = null;

        // Gamification Logic
        function updateStats() {
            elements.level.textContent = state.level;
            elements.streak.textContent = state.streak;
            elements.xp.textContent = state.xp;
            
            const xpForNextLevel = state.level * 100;
            elements.nextLevelXp.textContent = xpForNextLevel;
            
            const xpPercentage = (state.xp / xpForNextLevel) * 100;
            elements.xpBar.style.width = `${xpPercentage}%`;
            
            saveSession();
        }

        function addXP(amount) {
            state.xp += amount;
            const xpForNextLevel = state.level * 100;
            if (state.xp >= xpForNextLevel) {
                state.xp -= xpForNextLevel;
                state.level += 1;
                
                // Pemicu perayaan naik level
                setTimeout(() => {
                    showModal({
                        title: 'Naik Level!',
                        body: `Selamat! Anda telah naik ke **Level ${state.level}**. Pemahaman Anda mengenai ekosistem Google Apps Script semakin meningkat.`,
                        icon: 'award',
                        type: 'success',
                        footer: [{ text: 'Luar Biasa!', primary: true }]
                    });
                }, 500);
            }
            updateStats();
        }

        // Pomodoro Timer Logic
        function updateTimerDisplay() {
            const minutes = Math.floor(state.timer.timeLeft / 60);
            const seconds = state.timer.timeLeft % 60;
            elements.timerDisplay.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function toggleTimer() {
            if (state.timer.isActive) {
                // Pause
                clearInterval(timerInterval);
                state.timer.isActive = false;
                elements.timerToggle.textContent = 'Mulai';
                elements.timerToggle.className = 'flex-1 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-all';
            } else {
                // Start
                state.timer.isActive = true;
                elements.timerToggle.textContent = 'Jeda';
                elements.timerToggle.className = 'flex-1 py-2 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all';
                
                timerInterval = setInterval(() => {
                    state.timer.timeLeft--;
                    updateTimerDisplay();
                    
                    if (state.timer.timeLeft <= 0) {
                        clearInterval(timerInterval);
                        state.timer.isActive = false;
                        
                        if (state.timer.mode === 'work') {
                            // Selesai Sesi Fokus
                            addXP(50);
                            state.timer.mode = 'break';
                            state.timer.timeLeft = 5 * 60; // 5 menit break
                            elements.timerLabel.textContent = 'Waktu Istirahat';
                            elements.timerLabel.className = 'font-bold text-emerald-600 flex items-center gap-2';
                            
                            showModal({
                                title: 'Sesi Fokus Selesai!',
                                body: 'Hebat! Anda telah menyelesaikan 25 menit sesi fokus. Dapatkan **+50 XP** dan silakan beristirahat sejenak selama 5 menit.',
                                icon: 'coffee',
                                type: 'success',
                                footer: [{ text: 'Mulai Istirahat', primary: true, onClick: toggleTimer }]
                            });
                        } else {
                            // Selesai Sesi Break
                            state.timer.mode = 'work';
                            state.timer.timeLeft = 25 * 60;
                            elements.timerLabel.textContent = 'Waktu Fokus';
                            elements.timerLabel.className = 'font-bold text-slate-700 flex items-center gap-2';
                            
                            showModal({
                                title: 'Istirahat Selesai!',
                                body: 'Sesi istirahat Anda telah berakhir. Siap untuk kembali memfokuskan pikiran Anda mempelajari setup GAS?',
                                icon: 'timer',
                                type: 'success',
                                footer: [{ text: 'Mulai Fokus', primary: true, onClick: toggleTimer }]
                            });
                        }
                        
                        elements.timerToggle.textContent = 'Mulai';
                        elements.timerToggle.className = 'flex-1 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-all';
                        updateTimerDisplay();
                    }
                }, 1000);
            }
            saveSession();
        }

        // Modal Utilities
        function showModal(options) {
            elements.modalTitle.textContent = options.title;
            
            // Render MD in Modal Body
            elements.modalBody.innerHTML = marked.parse(options.body || '');
            
            // Set Icon
            elements.modalIcon.setAttribute('data-lucide', options.icon || 'info');
            
            // Style Icon Container
            elements.modalIconContainer.className = 'p-3 rounded-2xl';
            if (options.type === 'success') {
                elements.modalIconContainer.classList.add('bg-emerald-50', 'text-emerald-600');
            } else if (options.type === 'error') {
                elements.modalIconContainer.classList.add('bg-rose-50', 'text-rose-600');
            } else {
                elements.modalIconContainer.classList.add('bg-indigo-50', 'text-indigo-600');
            }
            
            // Render Footer Buttons
            elements.modalFooter.innerHTML = '';
            (options.footer || [{ text: 'Tutup', primary: true }]).forEach(btn => {
                const button = document.createElement('button');
                button.className = btn.primary ? 
                    'px-6 py-2.5 bg-indigo-600 text-white font-bold rounded-xl text-sm hover:bg-indigo-700 transition-all' : 
                    'px-6 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-sm hover:bg-slate-200 transition-all';
                button.textContent = btn.text;
                button.onclick = () => {
                    elements.modalOverlay.classList.add('hidden');
                    if (btn.onClick) btn.onClick();
                };
                elements.modalFooter.appendChild(button);
            });
            
            lucide.createIcons();
            elements.modalOverlay.classList.remove('hidden');
        }

        // Quiz Handler
        function startQuiz(chapter) {
            const quiz = chapter.quiz;
            if (!quiz) return;

            const container = document.createElement('div');
            container.className = 'space-y-4';
            
            const questionText = document.createElement('p');
            questionText.className = 'font-bold text-slate-800 text-base mb-4';
            questionText.textContent = quiz.question;
            container.appendChild(questionText);

            const optionsGrid = document.createElement('div');
            optionsGrid.className = 'grid grid-cols-1 gap-2';

            let selectedOption = null;
            const optionButtons = [];

            quiz.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left px-4 py-3 rounded-xl border border-slate-200 text-slate-700 hover:bg-slate-50 transition-all text-sm flex gap-3 items-center';
                btn.innerHTML = `<span class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-100 font-bold text-slate-600 text-xs">${opt.id.toUpperCase()}</span> <span>${opt.text}</span>`;
                
                btn.onclick = () => {
                    selectedOption = opt.id;
                    optionButtons.forEach(b => {
                        b.className = 'w-full text-left px-4 py-3 rounded-xl border border-slate-200 text-slate-700 hover:bg-slate-50 transition-all text-sm flex gap-3 items-center';
                    });
                    btn.className = 'w-full text-left px-4 py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50/50 text-indigo-900 font-semibold transition-all text-sm flex gap-3 items-center';
                };
                optionButtons.push(btn);
                optionsGrid.appendChild(btn);
            });
            container.appendChild(optionsGrid);

            showModal({
                title: 'Knowledge Check',
                body: '', // diisi kustom lewat container DOM
                icon: 'help-circle',
                type: 'quiz',
                footer: [
                    { text: 'Lewati Kuis', primary: false, onClick: proceedToNext },
                    { text: 'Kirim Jawaban', primary: true, onClick: () => {
                        if (!selectedOption) return;
                        const isCorrect = selectedOption === quiz.correctAnswer;
                        if (isCorrect) addXP(30);
                        
                        showModal({
                            title: isCorrect ? 'Jawaban Benar!' : 'Belum Tepat',
                            body: `${isCorrect ? 'Kerja bagus! Jawaban Anda tepat sekali.' : 'Jawaban yang benar adalah ' + quiz.correctAnswer.toUpperCase() + '.'} 
                            
                            ${quiz.explanation}`,
                            icon: isCorrect ? 'check-circle' : 'x-circle',
                            type: isCorrect ? 'success' : 'error',
                            footer: [{ text: 'Lanjutkan', primary: true, onClick: proceedToNext }]
                        });
                    }}
                ]
            });
            
            // Sisipkan kontainer kuis kustom ke dalam modal body
            document.getElementById('modal-body').appendChild(container);
        }

        // Navigation & Reader Render
        function renderChapter(idx) {
            state.currentIdx = idx;
            const chapter = ebook.chapters[idx];
            
            elements.title.textContent = chapter.title;
            elements.meta.textContent = (chapter.id === 'ch-intro' || chapter.id === 'ch-finish') ? 'Bagian Khusus' : `Bab ${idx} dari ${ebook.chapters.length - 2}`;
            
            // Parse Markdown
            elements.content.innerHTML = marked.parse(chapter.content || '*Tidak ada konten*');
            
            // Update Progress bar
            const progress = ((idx + 1) / ebook.chapters.length) * 100;
            elements.progress.style.width = `${progress}%`;
            elements.progressText.textContent = `${Math.round(progress)}%`;
            
            // Enable/disable buttons
            elements.prevBtn.disabled = idx === 0;
            
            if (idx === ebook.chapters.length - 1) {
                elements.nextBtn.innerHTML = 'Selesaikan Membaca <i data-lucide="check-circle" class="w-5 h-5 ml-2"></i>';
            } else {
                elements.nextBtn.innerHTML = 'Bab Selanjutnya <i data-lucide="arrow-right" class="w-5 h-5 ml-2"></i>';
            }
            lucide.createIcons();
            
            // Update TOC active state
            document.querySelectorAll('.toc-item').forEach((el, i) => {
                if (i === idx) {
                    el.className = 'toc-item w-full text-left px-4 py-3 rounded-xl text-sm font-bold transition-all border border-indigo-200 bg-indigo-50 text-indigo-700';
                } else {
                    el.className = 'toc-item w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all border border-transparent text-slate-600 hover:bg-slate-50';
                }
            });

            window.scrollTo({ top: 0, behavior: 'smooth' });
            saveSession();
        }

        function proceedToNext() {
            if (state.currentIdx < ebook.chapters.length - 1) {
                renderChapter(state.currentIdx + 1);
                addXP(20);
            } else {
                showModal({
                    title: 'Selamat! Dokumentasi Selesai!',
                    body: 'Hebat! Anda telah berhasil menyelesaikan seluruh bab panduan instalasi proyek GAS Hub dan menyelesaikan seluruh kuis dengan gemilang!',
                    icon: 'party-popper',
                    type: 'success',
                    footer: [{ text: 'Selesai & Keluar', primary: true, onClick: () => window.location.href = 'index.html' }]
                });
            }
        }

        function saveSession() {
            const toSave = { ...state };
            delete toSave.timer; // Jangan simpan data timer real-time
            localStorage.setItem(storageKey, JSON.stringify(toSave));
        }

        // Initialization
        ebook.chapters.forEach((ch, idx) => {
            const btn = document.createElement('button');
            btn.className = 'toc-item w-full text-left px-4 py-3 rounded-xl text-sm font-medium transition-all border border-transparent text-slate-600 hover:bg-slate-50';
            btn.textContent = ch.title;
            btn.onclick = () => renderChapter(idx);
            elements.toc.appendChild(btn);
        });

        elements.prevBtn.onclick = () => { 
            if (state.currentIdx > 0) renderChapter(state.currentIdx - 1); 
        };
        
        elements.nextBtn.onclick = () => { 
            const chapter = ebook.chapters[state.currentIdx];
            if (chapter.quiz) {
                startQuiz(chapter);
            } else {
                proceedToNext();
            }
        };
        
        elements.timerToggle.onclick = toggleTimer;
        elements.timerReset.onclick = () => {
            clearInterval(timerInterval);
            state.timer.isActive = false;
            state.timer.timeLeft = state.timer.mode === 'work' ? 25 * 60 : 5 * 60;
            updateTimerDisplay();
            elements.timerToggle.textContent = 'Mulai';
            elements.timerToggle.className = 'flex-1 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm hover:bg-slate-800 transition-all';
        };

        // Run
        lucide.createIcons();
        updateStats();
        updateTimerDisplay();
        renderChapter(state.currentIdx);
    </script>
